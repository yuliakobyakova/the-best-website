name: Build & Deploy

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir -p deploy
          cp -a .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public 2>/dev/null || true

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: deploy/*
          target: /tmp/landing-deploy
          strip_components: 1

      - name: Restart application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            APP_DIR=${{ secrets.APP_DIR || '/opt/landing' }}
            sudo systemctl stop landing.service || true
            sudo rm -rf "$APP_DIR/.next" "$APP_DIR/server.js" "$APP_DIR/node_modules"
            sudo cp -r /tmp/landing-deploy/* "$APP_DIR/"
            sudo chown -R www-data:www-data "$APP_DIR"
            sudo systemctl start landing.service
            rm -rf /tmp/landing-deploy
